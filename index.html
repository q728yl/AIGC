<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance Payload Preview</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333;
            --accent: #bb86fc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: var(--accent);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .panel h2 {
            margin-top: 0;
            color: #fff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .prompt-box {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid var(--accent);
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            overflow-x: auto;
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .media-card {
            background-color: #2a2a2a;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .media-card img, .media-card video {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background-color: #000;
        }
        .media-label {
            padding: 8px 12px;
            font-size: 12px;
            color: #aaa;
            word-break: break-all;
            border-top: 1px solid var(--border-color);
        }
        .tag {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Seedance Payload Preview</h1>
    <p>以下是即将（或刚刚）提交给火山引擎 Seedance API 的最终参数概览。</p>
    
    <div id="content">
        <p>Loading data...</p>
    </div>
</div>

<script>
    async function loadPayload() {
        try {
            // Fetch the JSON file generated by python
            // Note: Since this is loaded locally via file://, CORS/fetch might fail in some browsers.
            // Using a simple workaround by fetching it relative to the html.
            // For best results, run `python -m http.server` and view via localhost:8000
            const response = await fetch('latest_payload.json');
            
            if (!response.ok) {
                throw new Error("Failed to load payload JSON. Make sure you've run the submission script recently.");
            }
            
            const data = await response.json();
            renderContent(data);
        } catch (error) {
            document.getElementById('content').innerHTML = `
                <div class="prompt-box" style="border-left-color: #cf6679; color: #cf6679;">
                    Error loading data: ${error.message} <br><br>
                    <strong>注意：</strong>如果是在浏览器直接双击打开的此文件，可能会因为跨域安全策略无法读取本地JSON。<br>
                    建议在代码目录下终端运行: <br><code>python -m http.server 8000</code><br>然后在浏览器访问: <code>http://localhost:8000/index.html</code>
                </div>
            `;
        }
    }

    function renderContent(data) {
        let html = '';
        
        // 1. Prompt Panel
        html += `
            <div class="panel">
                <h2>📝 中文剧本 Prompt (text)</h2>
                <div class="prompt-box">${data.prompt_text}</div>
            </div>
        `;
        
        // 2. Video Panel
        if (data.video_url) {
            html += `
                <div class="panel">
                    <h2>🎥 参考动作视频 (video_url)</h2>
                    <div class="media-grid">
                        <div class="media-card">
                            <video controls src="${data.video_url}"></video>
                            <div class="media-label">
                                <span class="tag">ROLE: reference_video</span><br>
                                ${data.video_url}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 3. Images Panel
        if (data.images && data.images.length > 0) {
            html += `
                <div class="panel">
                    <h2>🖼️ 参考图片集 (image_url) - 共 ${data.images.length} 张</h2>
                    <div class="media-grid">
            `;
            
            data.images.forEach((img, index) => {
                const label = index === 0 ? "First Frame Lock" : "Generated Asset";
                html += `
                    <div class="media-card">
                        <img src="${img}" alt="Reference Image ${index}">
                        <div class="media-label">
                            <span class="tag">ROLE: reference_image</span><br>
                            <strong>[${label}]</strong><br>
                            ${img}
                        </div>
                    </div>
                `;
            });
            
            html += `
                    </div>
                </div>
            `;
        }
        
        document.getElementById('content').innerHTML = html;
    }

    // Initialize
    loadPayload();
</script>

</body>
</html>
